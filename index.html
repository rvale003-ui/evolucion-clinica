<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Evolución Clínica</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body style="font-family: Arial; padding: 20px;">

<h2>Evolución Clínica</h2>

<textarea id="texto" style="width:100%; height:250px;">
Paciente en buenas condiciones generales, consciente lúcido y orientado, en Glasgow 15, sin dolor.
Ventilando espontáneamente, sin oxígeno, FR 16, SatO2 98%.
Hemodinámicamente estable, normotenso, eucárdico.
</textarea>

<br><br>

<button onclick="copiar()">Copiar evolución</button>

<script>
function copiar() {
  const texto = document.getElementById("texto");
  texto.select();
  document.execCommand("copy");
  alert("Copiado al portapapeles");
}
</script>

</body>
</html>
